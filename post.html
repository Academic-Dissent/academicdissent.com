  <body>

    <script src="js/data.js"></script>
    <!-- YAML parser for front matter (needed by client-side loader) -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <!-- Client-side loader to populate AD_DATA from Markdown so post pages can render by slug -->
    <script src="js/load-dissents.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
      // Configure marked
      marked.setOptions({
        breaks: true,
        highlight: function(code, lang) {
          try { return hljs.highlight(code, {language: lang}).value; } catch(e) { return hljs.highlightAuto(code).value; }
        }
      });
      // MathJax v3 configuration: support $..$ and $$..$$, and avoid code/pre blocks
      window.MathJax = {
        tex: {
          inlineMath: [['$','$'], ['\\(','\\)']],
          displayMath: [['$$','$$'], ['\\[','\\]']]
        },
        options: {
          skipHtmlTags: ['script','noscript','style','textarea','pre','code']
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Defer post.js so it runs after MathJax and after the loader populated AD_DATA -->
    <script defer src="js/post.js"></script>
    <script src="js/search.js"></script>
  </body>
